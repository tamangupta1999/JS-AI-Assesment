name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tickets
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build packages
        run: pnpm --filter @repo/shared build && pnpm --filter @repo/db build

      - name: Run migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tickets
        run: pnpm db:migrate

      - name: Seed database
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tickets
        run: pnpm db:seed

      - name: Run tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tickets
          JWT_ACCESS_SECRET: test-access-secret-min-32-characters
          JWT_REFRESH_SECRET: test-refresh-secret-min-32-characters
        run: pnpm --filter @repo/shared test && pnpm --filter @repo/api test

      - name: Typecheck API
        run: pnpm --filter @repo/api lint

      - name: Build web
        run: pnpm --filter @repo/web build
